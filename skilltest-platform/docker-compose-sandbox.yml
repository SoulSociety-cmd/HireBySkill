version: '3.8'

services:
  code-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: skilltest-sandbox
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Optional for nested Docker
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

