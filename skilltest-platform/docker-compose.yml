version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: skilltest-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: skilltest-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://root:example@mongodb:27017/skilltest?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - /app/node_modules

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.frontend
    container_name: skilltest-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  mongodb_data:
